services:
  - type: web
    name: colobrief-ai
    env: node
    plan: free
    buildCommand: bun install && bun run build
    startCommand: bun run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ZHIPU_BASE_URL
        value: https://open.bigmodel.cn/api/paas/v4
      - key: ZHIPU_API_KEY
        sync: false
      - key: MAILTRAP_TOKEN
        sync: false
      - key: MAILTRAP_SENDER_EMAIL
        sync: false
      - key: MAILTRAP_SENDER_NAME
        value: ColoBrief AI
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: file:./data/custom.db
